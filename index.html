<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダーバー -->
  <header class="global-header">
    <div class="header-inner">
      <h1 class="logo">Twitter</h1>
      <div class="header-search">
        <input type="text" class="search-input" placeholder="検索" disabled>
      </div>
      <nav class="header-nav">
        <a href="#" class="nav-link nav-active">ホーム</a>
        <a href="#" class="nav-link">@つながり</a>
        <a href="#" class="nav-link">ダイレクトメッセージ</a>
      </nav>
    </div>
  </header>

  <!-- メインコンテンツ（3カラム） -->
  <div class="container">

    <!-- 左サイドバー -->
    <aside class="sidebar-left">
      <div class="profile-card">
        <div class="profile-header-bg"></div>
        <div class="profile-body">
          <div class="profile-icon">
            <div class="egg-icon">
              <div class="egg-body"></div>
            </div>
          </div>
          <div class="profile-info">
            <span class="profile-name">やまだ たろう</span>
            <span class="profile-screen-name">@yamada_taro_11</span>
          </div>
          <div class="profile-stats">
            <a href="#" class="stat">
              <span class="stat-label">ツイート</span>
              <span class="stat-value">1,234</span>
            </a>
            <a href="#" class="stat">
              <span class="stat-label">フォロー中</span>
              <span class="stat-value">256</span>
            </a>
            <a href="#" class="stat">
              <span class="stat-label">フォロワー</span>
              <span class="stat-value">512</span>
            </a>
          </div>
        </div>
      </div>
      <div class="tweet-box">
        <div class="tweet-box-label">いまどうしてる？</div>
        <textarea class="tweet-box-input" id="tweet-input" placeholder="いまどうしてる？" maxlength="140"></textarea>
        <div class="tweet-box-footer">
          <span class="tweet-counter" id="tweet-counter">140</span>
          <button class="tweet-btn" id="tweet-btn">ツイート</button>
        </div>
      </div>
    </aside>

    <!-- タイムライン（メイン） -->
    <main class="timeline">
      <div class="timeline-header">
        <h2>ホーム</h2>
      </div>
      <div id="timeline-list">
        <!-- ツイートがここに挿入される -->
      </div>
    </main>

    <!-- 右サイドバー -->
    <aside class="sidebar-right">
      <div class="trends-box">
        <h3 class="sidebar-title">トレンド</h3>
        <ul class="trends-list">
          <li><a href="#">#なう</a></li>
          <li><a href="#">#わず</a></li>
          <li><a href="#">#nowplaying</a></li>
          <li><a href="#">#好きな人RT</a></li>
          <li><a href="#">#followme</a></li>
          <li><a href="#">#拡散希望</a></li>
          <li><a href="#">#アニメ好きと繋がりたい</a></li>
        </ul>
      </div>
      <div class="suggestions-box">
        <h3 class="sidebar-title">おすすめユーザー</h3>
        <ul class="suggestions-list">
          <li class="suggestion-item">
            <div class="suggestion-icon" style="background-color: #E8536D;"></div>
            <div class="suggestion-info">
              <span class="suggestion-name">さくら</span>
              <span class="suggestion-screen">@sakura_cherry</span>
            </div>
            <button class="follow-btn">フォローする</button>
          </li>
          <li class="suggestion-item">
            <div class="suggestion-icon" style="background-color: #6B8E23;"></div>
            <div class="suggestion-info">
              <span class="suggestion-name">りょうた</span>
              <span class="suggestion-screen">@ryota_game</span>
            </div>
            <button class="follow-btn">フォローする</button>
          </li>
          <li class="suggestion-item">
            <div class="suggestion-icon" style="background-color: #9B59B6;"></div>
            <div class="suggestion-info">
              <span class="suggestion-name">あやか</span>
              <span class="suggestion-screen">@ayaka_music</span>
            </div>
            <button class="follow-btn">フォローする</button>
          </li>
        </ul>
      </div>
    </aside>

  </div>

  <script src="js/users.js"></script>
  <script src="js/tweets.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
