<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダーバー -->
  <header class="global-header">
    <div class="header-inner">
      <h1 class="logo">Twitter</h1>
      <div class="header-search">
        <input type="text" class="search-input" placeholder="検索" disabled>
      </div>
      <nav class="header-nav">
        <a href="#" class="nav-link nav-active">ホーム</a>
        <a href="#" class="nav-link">@つながり</a>
        <a href="#" class="nav-link">ダイレクトメッセージ</a>
      </nav>
    </div>
  </header>

  <!-- メインコンテンツ（3カラム） -->
  <div class="container">

    <!-- 左サイドバー -->
    <aside class="sidebar-left">
      <div class="profile-card">
        <div class="profile-icon"></div>
        <div class="profile-info">
          <span class="profile-name">ユーザー名</span>
          <span class="profile-screen-name">@username</span>
        </div>
        <div class="profile-stats">
          <div class="stat">
            <span class="stat-label">ツイート</span>
            <span class="stat-value">1,234</span>
          </div>
          <div class="stat">
            <span class="stat-label">フォロー</span>
            <span class="stat-value">256</span>
          </div>
          <div class="stat">
            <span class="stat-label">フォロワー</span>
            <span class="stat-value">512</span>
          </div>
        </div>
      </div>
      <div class="tweet-box">
        <div class="tweet-box-label">いまどうしてる？</div>
        <div class="tweet-box-input"></div>
        <div class="tweet-box-footer">
          <button class="tweet-btn" disabled>ツイート</button>
        </div>
      </div>
    </aside>

    <!-- タイムライン（メイン） -->
    <main class="timeline">
      <div class="timeline-header">
        <h2>ホーム</h2>
      </div>
      <div id="timeline-list">
        <!-- ツイートがここに挿入される -->
      </div>
    </main>

    <!-- 右サイドバー -->
    <aside class="sidebar-right">
      <div class="trends-box">
        <h3 class="sidebar-title">トレンド</h3>
        <ul class="trends-list">
          <li><a href="#">#ダミートレンド</a></li>
        </ul>
      </div>
      <div class="suggestions-box">
        <h3 class="sidebar-title">おすすめユーザー</h3>
        <ul class="suggestions-list">
          <li>ダミーユーザー</li>
        </ul>
      </div>
    </aside>

  </div>

  <script src="js/users.js"></script>
  <script src="js/tweets.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
